<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOTHA AI — Your Voice, Automated | AI Voice Agents in 50+ Languages</title>
    <meta name="description" content="Build, deploy, and scale hyper-realistic AI voice agents in 50+ languages. Automate your customer service, sales, and operations with KOTHA AI." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KOTHA AI — Your Voice, Automated | AI Voice Agents in 50+ Languages" />
    <meta property="og:description" content="Build, deploy, and scale hyper-realistic AI voice agents in 50+ languages. Automate your customer service, sales, and operations with KOTHA AI." />
    <meta property="og:image" id="og-image" content="/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="KOTHA AI — Your Voice, Automated | AI Voice Agents in 50+ Languages" />
    <meta property="twitter:description" content="Build, deploy, and scale hyper-realistic AI voice agents in 50+ languages. Automate your customer service, sales, and operations with KOTHA AI." />
    <meta property="twitter:image" id="twitter-image" content="/og.jpg" />

    <!-- Dynamic OG URL Script -->
    <script>
      (function() {
        var absoluteImageUrl = window.location.origin + '/og.jpg';
        var ogImage = document.getElementById('og-image');
        var twitterImage = document.getElementById('twitter-image');
        
        if (ogImage) ogImage.setAttribute('content', absoluteImageUrl);
        if (twitterImage) twitterImage.setAttribute('content', absoluteImageUrl);

        var ogUrl = document.createElement('meta');
        ogUrl.setAttribute('property', 'og:url');
        ogUrl.setAttribute('content', window.location.href);
        document.head.appendChild(ogUrl);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo-symbol.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/kotha_ai_favicon_ico.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500&f[]=satoshi@700,500,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
